# Cấu hình Data Layer (Postgres, Kafka, Keycloak, etc.)
postgresql:
  replicas: 1
  username: yasadminuser
  password: admin
pgadmin:
  hostname: pgadmin-dev-52.yas.local.com
zookeeper: {}
kafka-cluster:
  kafka:
    replicas: 1
  zookeeper:
    replicas: 1
  postgresql:
    username: yasadminuser
    password: admin
akhq:
  hostname: akhq-dev-52.yas.local.com
elasticsearch-cluster:
  elasticsearch:
    replicas: 1
  kibana:
    ingress:
      hostname: kibana-dev-52.yas.local.com
redis:
  auth:
    password: redis
keycloak:
  hostname: identity-dev-52.yas.local.com
  postgresql:
    username: yasadminuser
    password: admin
  bootstrapAdmin:
    username: admin
    password: admin
  backofficeRedirectUrl: https://backoffice-dev-52.yas.local.com
  storefrontRedirectUrl: https://storefront-dev-52.yas.local.com
  apiRedirectUrl: https://api-dev-52.yas.local.com
