global:
  domain: yas.local.com
  envTag: dev-52
  image:
    tag: latest

# Ghi chú: Nếu bạn đang sử dụng Umbrella Chart (hoặc ApplicationSet), 
# ArgoCD sẽ tự động truyền các giá trị này xuống tất cả các subcharts.

# Cấu hình tag cho từng service riêng lẻ
backoffice-bff:
  backend:
    image:
      tag: latest
backoffice-ui:
  ui:
    image:
      tag: latest
cart:
  backend:
    image:
      tag: latest
customer:
  backend:
    image:
      tag: latest
inventory:
  backend:
    image:
      tag: latest
location:
  backend:
    image:
      tag: latest
media:
  backend:
    image:
      tag: latest
order:
  backend:
    image:
      tag: latest
payment:
  backend:
    image:
      tag: latest
payment-paypal:
  backend:
    image:
      tag: latest
product:
  backend:
    image:
      tag: latest
promotion:
  backend:
    image:
      tag: latest
rating:
  backend:
    image:
      tag: latest
recommendation:
  backend:
