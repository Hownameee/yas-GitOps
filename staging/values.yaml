# Cấu hình Data Layer (Postgres, Kafka, Keycloak, etc.)
postgresql:
  replicas: 1
  username: yasadminuser
  password: admin
pgadmin:
  hostname: pgadmin-staging.yas.local.com
zookeeper: {}
kafka-cluster:
  kafka:
    replicas: 1
  zookeeper:
    replicas: 1
  postgresql:
    username: yasadminuser
    password: admin
akhq:
  hostname: akhq-staging.yas.local.com
elasticsearch-cluster:
  elasticsearch:
    replicas: 1
  kibana:
    ingress:
      hostname: kibana-staging.yas.local.com
redis:
  auth:
    password: redis
keycloak:
  hostname: identity-staging.yas.local.com
  postgresql:
    username: yasadminuser
    password: admin
  bootstrapAdmin:
    username: admin
    password: admin
  backofficeRedirectUrl: https://backoffice-staging.yas.local.com
  storefrontRedirectUrl: https://storefront-staging.yas.local.com
  apiRedirectUrl: https://api-staging.yas.local.com
