global:
  domain: yas.local.com
  envTag: staging
  image:
    tag: rc_v1.0.0

# Ghi chú: Nếu bạn đang sử dụng Umbrella Chart (hoặc ApplicationSet), 
# ArgoCD sẽ tự động truyền các giá trị này xuống tất cả các subcharts.

# Cấu hình tag cho từng service riêng lẻ
